<svg xmlns="http://www.w3.org/2000/svg" width="720" height="450"
     viewBox="0 0 720 450"
     font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
     font-size="14">

  <!-- Background -->
  <rect width="720" height="450" rx="12" fill="#ffffff"/>

  <!-- Title -->
  <text x="28" y="52" font-size="26" font-weight="700" fill="#1a1a1a">Hover List</text>

  <!-- Last updated -->
  <text x="28" y="82" fill="#6c7086" font-style="italic" font-size="13">*Last updated: 2026-01-01*</text>

  <!-- Table outer border -->
  <rect x="28" y="108" width="664" height="312" rx="4" fill="none" stroke="#d1d5db" stroke-width="1"/>

  <!-- Header background (same as main bg) -->
  <rect x="28" y="108" width="664" height="42" rx="4" fill="#ffffff"/>
  <rect x="28" y="132" width="664" height="18" fill="#ffffff"/>

  <!-- Column dividers -->
  <line x1="198" y1="108" x2="198" y2="420" stroke="#d1d5db" stroke-width="1"/>
  <line x1="358" y1="108" x2="358" y2="420" stroke="#d1d5db" stroke-width="1"/>

  <!-- Header text -->
  <text x="40" y="136" font-weight="700" fill="#1a1a1a">Word</text>
  <text x="210" y="136" font-weight="700" fill="#1a1a1a">Content</text>
  <text x="370" y="136" font-weight="700" fill="#1a1a1a">Source</text>

  <!-- Row separators -->
  <line x1="28" y1="150" x2="692" y2="150" stroke="#d1d5db" stroke-width="1"/>
  <line x1="28" y1="195" x2="692" y2="195" stroke="#d1d5db" stroke-width="1"/>
  <line x1="28" y1="240" x2="692" y2="240" stroke="#d1d5db" stroke-width="1"/>
  <line x1="28" y1="285" x2="692" y2="285" stroke="#d1d5db" stroke-width="1"/>
  <line x1="28" y1="330" x2="692" y2="330" stroke="#d1d5db" stroke-width="1"/>
  <line x1="28" y1="375" x2="692" y2="375" stroke="#d1d5db" stroke-width="1"/>

  <!-- Row 1 -->
  <text x="40" y="179" fill="#1a1a1a">eloquent</text>
  <text x="210" y="179" fill="#1a1a1a">口才流利的</text>
  <text x="370" y="179" fill="#f59e0b" text-decoration="underline">Notes/Chapter 1</text>

  <!-- Row 2 -->
  <text x="40" y="224" fill="#1a1a1a">perseverance</text>
  <text x="210" y="224" fill="#1a1a1a">毅力、堅持</text>
  <text x="370" y="224" fill="#f59e0b" text-decoration="underline">Notes/Chapter 1</text>

  <!-- Row 3 -->
  <text x="40" y="269" fill="#1a1a1a">meticulous</text>
  <text x="210" y="269" fill="#1a1a1a">一絲不苟的</text>
  <text x="370" y="269" fill="#f59e0b" text-decoration="underline">Notes/Chapter 2</text>

  <!-- Row 4 -->
  <text x="40" y="314" fill="#1a1a1a">ambiguous</text>
  <text x="210" y="314" fill="#1a1a1a">模稜兩可的</text>
  <text x="370" y="314" fill="#f59e0b" text-decoration="underline">Notes/Chapter 2</text>

  <!-- Row 5 -->
  <text x="40" y="359" fill="#1a1a1a">resilient</text>
  <text x="210" y="359" fill="#1a1a1a">有彈性的</text>
  <text x="370" y="359" fill="#f59e0b" text-decoration="underline">Notes/Chapter 3</text>

  <!-- Row 6 -->
  <text x="40" y="404" fill="#1a1a1a">spontaneous</text>
  <text x="210" y="404" fill="#1a1a1a">自發性的</text>
  <text x="370" y="404" fill="#f59e0b" text-decoration="underline">Notes/Chapter 3</text>

</svg>
